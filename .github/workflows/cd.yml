name: cd

# Releases fire when a SemVer tag (no `v` prefix, e.g. 1.0.0 or 1.0.0-rc.1)
# is pushed. workflow_dispatch is kept as a manual escape hatch — handy for
# re-running a release that hit a transient failure, or for dry-running on
# the current Cargo.toml version without cutting a tag.
on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

env:
  REPO_NAME: gitalong
  CARGO_TERM_COLOR: always

jobs:
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      should_release: ${{ steps.version.outputs.SHOULD_RELEASE }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version and check for existing release
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CARGO_VERSION=$(awk -F'"' '/^version =/ { print $2; exit }' Cargo.toml)

          # Tag-triggered runs are the canonical release path. Read the
          # version from the tag and require Cargo.toml to match exactly —
          # otherwise the binary would print one version while the GitHub
          # Release tag and tap PR claim another. workflow_dispatch falls
          # back to whatever Cargo.toml says, since there's no tag to
          # consult.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
              echo "::error::Tag '${TAG_VERSION}' does not match Cargo.toml version '${CARGO_VERSION}'. Bump Cargo.toml first, or retag."
              exit 1
            fi
            VERSION="$TAG_VERSION"
            echo "Tag-driven release: ${VERSION}"
          else
            VERSION="$CARGO_VERSION"
            echo "Manual run: using Cargo.toml version ${VERSION}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

          # Probe for an existing GitHub Release at this tag. If it's
          # there, skip — re-running the workflow on the same version is
          # idempotent. The auto-injected GITHUB_TOKEN is enough to read
          # releases on this repo.
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "SHOULD_RELEASE=false" >> "$GITHUB_OUTPUT"
            echo "Release ${VERSION} already exists — skipping."
          else
            echo "SHOULD_RELEASE=true" >> "$GITHUB_OUTPUT"
            echo "Release ${VERSION} not found — building."
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both macOS targets run on Apple Silicon runners — x86_64 is
          # produced via native cross-compile (Rust + the Mac SDK on arm
          # know how to emit Intel Mach-O), avoiding the macos-13 (Intel)
          # runner queue.
          - target: aarch64-apple-darwin
            os: macos-15
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-15
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target }}-

      # libgit2 is statically linked via the `vendored` feature so the
      # released binary doesn't depend on the host's system library.
      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        run: cargo build --release --features vendored --target ${{ matrix.target }}
        shell: bash

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release --features vendored --target ${{ matrix.target }}
        shell: pwsh

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        env:
          VERSION: ${{ needs.detect-version.outputs.version }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          mkdir -p dist
          ARTIFACT="${REPO_NAME}-${VERSION}-${TARGET}.tar.gz"
          tar -czf "dist/${ARTIFACT}" \
            -C "target/${TARGET}/release" "${REPO_NAME}"
          ls -lh dist/

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        env:
          VERSION: ${{ needs.detect-version.outputs.version }}
          TARGET: ${{ matrix.target }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $artifact = "${env:REPO_NAME}-${env:VERSION}-${env:TARGET}.zip"
          Compress-Archive `
            -Path "target/${env:TARGET}/release/${env:REPO_NAME}.exe" `
            -DestinationPath "dist/$artifact"
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPO_NAME }}-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [detect-version, build]
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write    # required for softprops/action-gh-release
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version.outputs.version }}
          name: ${{ needs.detect-version.outputs.version }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Submit to Homebrew tap
        env:
          # GitHub forbids the `GITHUB_` prefix in secret names, so the secret
          # is stored as HOMEBREW_TAP_TOKEN and the workflow renames it to
          # GITHUB_PERSONAL_ACCESS_TOKEN — the env-var name submit_build.sh
          # reads (matches Peel and the local .env convention).
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_URL: ${{ secrets.HOMEBREW_TAP_URL }}
        run: ./submit_build.sh --pull-request ${{ needs.detect-version.outputs.version }}
