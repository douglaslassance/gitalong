name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux uses apt's libgit2-dev to keep dev builds fast.
          - os: ubuntu-latest
            features: ""
          # macOS relies on git2's auto-vendored fallback when no system
          # libgit2 is present on the runner.
          - os: macos-latest
            features: ""
          # Windows has no system libgit2, so always vendor here. Slower
          # build but the only path that actually links.
          - os: windows-latest
            features: "--features vendored"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install libgit2 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgit2-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets ${{ matrix.features }} -- -D warnings

      - name: cargo test
        run: cargo test --all-targets ${{ matrix.features }}

      - name: cargo doc
        run: cargo doc --no-deps ${{ matrix.features }}
        env:
          RUSTDOCFLAGS: -D warnings
