name: ci

# Auto-runs on push/PR are disabled while the Rust rewrite is still WIP.
# Re-enable by restoring the push/pull_request triggers below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main, rust]
  # pull_request:
  #   branches: [main, rust]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux + macOS cover the platforms gitalong actually targets at the
        # moment. Add windows-latest here once we've worked out the
        # permission-management semantics there.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # libgit2 ships with the `vendored` feature; for CI dev builds we use
      # the system one if available to keep build times reasonable.
      - name: Install libgit2 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgit2-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

      - name: cargo doc
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
